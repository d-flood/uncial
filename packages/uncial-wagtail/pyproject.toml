[project]
name = "uncial-wagtail"
version = "0.0.0"
description = "Wagtail integration for Uncial headless page bodies"
readme = "README.md"
requires-python = ">=3.14"
dependencies = ["django>=5.2", "wagtail>=7.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = ["pytest", "pytest-django", "ruff", "pyright"]

[tool.hatch.build.targets.wheel]
packages = ["src/uncial_wagtail"]

[tool.hatch.build.targets.sdist]
exclude = ["/demo", "/testproject", "/tests", "/frontend", "/dist"]

[tool.hatch.build.targets.wheel.shared-data]
"src/uncial_wagtail/templates" = "uncial_wagtail/templates"
"src/uncial_wagtail/static" = "uncial_wagtail/static"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "testproject.settings"
pythonpath = ["src", "."]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py314"

[tool.pyright]
include = ["src", "tests", "testproject", "demo"]
pythonVersion = "3.14"
typeCheckingMode = "basic"
