{% load wagtailcore_tags %}
<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>{{ page.title }}</title>
	</head>
	<body>
		<h1>{{ page.title }}</h1>
		{{ page.intro|richtext }}
		<ul>
			{% for child in page.get_children.live %}
				<li><a href="{{ child.url }}">{{ child.title }}</a></li>
			{% endfor %}
		</ul>
		<p><a href="/admin/">Open Wagtail admin</a></p>
	</body>
</html>
