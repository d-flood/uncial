name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: BASE_PATH=/${{ github.event.repository.name }} bun run build

      # Own step so the docs build's BASE_PATH does not leak into the landing site.
      - name: Build docs
        run: BASE_PATH=/${{ github.event.repository.name }}/docs bun --filter=uncial-docs run build

      - name: Assert docs content pages ship no CMS JS
        run: bun --filter=uncial-docs run assert:clean-pages

      - name: Merge docs into Pages artifact
        run: |
          mkdir -p packages/uncial/build/docs
          cp -R packages/uncial-docs/build/. packages/uncial/build/docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/uncial/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
