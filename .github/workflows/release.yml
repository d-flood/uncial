name: Release

# Note: the changesets "Version Packages" PR is created with GITHUB_TOKEN, which does
# not trigger pull_request workflows. That PR therefore shows no checks — publishing is
# still gated because validate runs again on the push to main before any publish job.
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Unit tests (uncial)
        run: bun --filter=uncial run test:unit -- --run

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        working-directory: packages/uncial

      - name: Browser tests (uncial)
        run: bun --filter=uncial run test:browser -- --run

      - name: E2E tests (uncial)
        run: bun --filter=uncial run test:e2e

      - name: JS tests (uncial-wagtail)
        run: bun --filter=uncial-wagtail run test

      - name: Sync Python dependencies
        run: uv sync --locked
        working-directory: packages/uncial-wagtail

      - name: Python tests (uncial-wagtail)
        run: uv run --locked pytest
        working-directory: packages/uncial-wagtail

      - name: Python tests on minimum supported Python (uncial-wagtail, 3.11)
        run: uv run --locked --python 3.11 pytest
        working-directory: packages/uncial-wagtail

      - name: Check committed Wagtail bundles
        run: |
          bun --filter=uncial-wagtail run build:admin
          bun --filter=uncial-wagtail run build:demo-blocks
          git diff --exit-code -- packages/uncial-wagtail/src/uncial_wagtail/static/uncial_wagtail/ packages/uncial-wagtail/demo/pages/static/pages/ || {
            echo "::error::Committed Wagtail bundles are stale. Run 'bun --filter=uncial-wagtail run build:admin' and 'bun --filter=uncial-wagtail run build:demo-blocks' and commit the result."
            exit 1
          }

  publish-npm-github:
    name: Publish to npm & GitHub
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      # The version script re-locks uv.lock after bumping pyproject.toml, so the
      # version PR keeps `uv sync --locked` in validate green.
      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run prepack

      - name: Create Version PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

  publish-pypi:
    name: Publish to PyPI
    needs: publish-npm-github
    if: github.event_name == 'push' && needs.publish-npm-github.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun --filter=uncial-wagtail run build

      - name: Build Python package
        run: uv build
        working-directory: packages/uncial-wagtail

      - name: Publish
        run: uv publish
        working-directory: packages/uncial-wagtail
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
